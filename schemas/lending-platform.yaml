# yaml-language-server: $schema=./ledger-schema.schema.json
meta:
  slug: lending-platform
  name: "Lending Platform"
  description: "Borrower principal and interest with lender funding pools."
  tags:
    - "lending"
    - "loans"
    - "interest"
  docsUrl: "https://docs.formance.com/examples/advanced/lending-platform"
chart:
  borrowers:
    $borrower_id:
      .pattern: '^[a-zA-Z0-9_-]+$'
      principal:
        .self: {}
        .metadata:
          type:
            default: "borrower_principal"
      interest:
        .self: {}

  lenders:
    $lender_id:
      .pattern: '^[a-zA-Z0-9_-]+$'
      available:
        .self: {}
      deployed:
        .self: {}

  loans:
    $loan_id:
      .pattern: '^[a-zA-Z0-9_-]+$'
      outstanding:
        .self: {}
      payments:
        .self: {}
